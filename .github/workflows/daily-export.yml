name: Daily Discord Export

on:
  schedule:
    - cron: "0 6 * * *"  # 6 AM UTC daily
  workflow_dispatch:       # Allow manual runs

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run Discord export
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: uv run discord-summary --config config.yaml

      - name: Commit and push new exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/ export_state.json
          if git diff --cached --quiet; then
            echo "No new messages exported, nothing to commit."
          else
            git commit -m "chore: daily Discord export $(date -u '+%Y-%m-%d')"
            git push
          fi
