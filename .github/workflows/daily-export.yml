name: Daily Discord Export

on:
  schedule:
    - cron: "0 6 * * *"  # 6 AM UTC daily
  workflow_dispatch:       # Allow manual runs

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run Discord export
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: uv run discord-summary --config config.yaml

      - name: Commit and push new exports
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily Discord export"
          file_pattern: "exports/ export_state.json"
